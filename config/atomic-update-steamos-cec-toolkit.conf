# Preserve SteamOS CEC Toolkit files across SteamOS atomic updates.
#
# SteamOS may rebuild /etc during an OS update. These paths are managed by the
# installer and should be carried forward by holo-sync-var when available.

/etc/steamos-cec-toolkit.conf
/etc/sudoers.d/zz-steamos-cec-toolkit-volume

/etc/systemd/system/steamos-cec-before-sleep.service
/etc/systemd/system/steamos-cec-permissions.service
/etc/systemd/system/steamos-cec-usb-wake.service
/etc/systemd/system/sleep.target.wants/steamos-cec-before-sleep.service
/etc/systemd/system/shutdown.target.wants/steamos-cec-before-sleep.service
/etc/systemd/system/multi-user.target.wants/steamos-cec-permissions.service
/etc/systemd/system/multi-user.target.wants/steamos-cec-usb-wake.service
/etc/systemd/system-sleep/steamos-cec-before-sleep

/etc/udev/rules.d/70-steamos-cec-toolkit.rules

/etc/atomic-update.conf.d/steamos-cec-toolkit.conf
